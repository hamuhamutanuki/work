<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이번 주 근무시간은?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .tracker { width: 100%; max-width: 680px; padding: 1.5rem; background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.12); }
  .title { font-size: 16px; font-weight: 500; color: #1a1a18; margin: 0 0 1.25rem; }
  .target-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0.5rem; padding: 12px 14px; background: #f5f5f3; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.12); }
  .target-label { font-size: 13px; color: #666663; white-space: nowrap; }
  .target-input { width: 64px; text-align: center; font-size: 14px; padding: 4px 8px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.25); background: #fff; color: #1a1a18; }
  .target-input:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,0.12); }
  .avg-box { margin-left: auto; font-size: 13px; color: #666663; text-align: right; }
  .avg-box strong { color: #1a1a18; font-weight: 500; }
  .hint { font-size: 11px; color: #999994; margin: 0 0 0.75rem; padding: 0 2px; }
  .days-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; margin-bottom: 1.25rem; }
  .day-card { border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 8px 6px; background: #fff; text-align: center; transition: background 0.15s; cursor: pointer; user-select: none; }
  .day-card.holiday { background: #f5f5f3; }
  .day-card:not(.holiday):hover { background: #f9f9f7; }
  .day-label { font-size: 12px; font-weight: 500; color: #666663; padding: 3px 0 6px; border-radius: 4px; transition: color 0.15s; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .day-card.holiday .day-label { color: #e24b4a; }
  .time-input { width: 100%; font-size: 13px; text-align: center; padding: 5px 2px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.12); background: #f5f5f3; color: #1a1a18; }
  .time-input:focus { outline: none; border-color: rgba(0,0,0,0.25); box-shadow: 0 0 0 2px rgba(55,138,221,0.12); }
  .holiday-msg { font-size: 11px; color: #999994; padding: 4px 0; min-height: 28px; display: flex; align-items: center; justify-content: center; }
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sum-card { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; border: 0.5px solid rgba(0,0,0,0.12); }
  .sum-label { font-size: 12px; color: #666663; margin-bottom: 4px; }
  .sum-value { font-size: 13px; font-weight: 500; color: #1a1a18; }
  .sum-sub { font-size: 12px; color: #999994; margin-top: 2px; }
  .progress-wrap { margin-top: 10px; height: 6px; background: rgba(0,0,0,0.1); border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 99px; background: #378ADD; transition: width 0.3s; }
  .progress-bar.over { background: #e24b4a; }
  .reset-row { margin-top: 1rem; display: flex; justify-content: center; }
  .reset-btn { font-size: 12px; color: #999994; background: none; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; padding: 6px 16px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .reset-btn:hover { color: #e24b4a; border-color: #e24b4a; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0efe8; }
    .tracker { background: #2c2c2a; border-color: rgba(255,255,255,0.1); }
    .title, .sum-value { color: #f0efe8; }
    .target-row, .day-card.holiday, .sum-card, .time-input { background: #3a3a38; }
    .target-row, .day-card, .sum-card { border-color: rgba(255,255,255,0.1); }
    .target-input { background: #2c2c2a; color: #f0efe8; border-color: rgba(255,255,255,0.2); }
    .time-input { background: #3a3a38; color: #f0efe8; border-color: rgba(255,255,255,0.1); }
    .day-card { background: #2c2c2a; border-color: rgba(255,255,255,0.1); }
    .progress-wrap { background: rgba(255,255,255,0.1); }
    .reset-btn { border-color: rgba(255,255,255,0.15); }
    .reset-btn:hover { color: #e24b4a; border-color: #e24b4a; }
  }
</style>
</head>
<body>
<div class="tracker">
  <p class="title">이번 주 근무시간은?</p>

  <div class="target-row">
    <span class="target-label"><i class="ti ti-target" aria-hidden="true"></i> 주간 목표</span>
    <input class="target-input" type="number" id="targetHours" value="40" min="0" max="168" step="0.5">
    <span style="font-size:13px;color:#666663;">시간</span>
    <div class="avg-box" id="avgBox">—</div>
  </div>

  <p class="hint">클릭: 휴일↔근무일 전환</p>

  <div class="days-grid" id="daysGrid"></div>

  <div class="summary">
    <div class="sum-card">
      <div class="sum-label"><i class="ti ti-clock" aria-hidden="true" style="font-size:14px;vertical-align:-1px;margin-right:3px;"></i>총 근무시간</div>
      <div class="sum-value" id="totalDisplay">0:00</div>
      <div class="sum-sub" id="totalSub">목표 대비 0:00 부족</div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>
    <div class="sum-card">
      <div class="sum-label"><i class="ti ti-calendar-stats" aria-hidden="true" style="font-size:14px;vertical-align:-1px;margin-right:3px;"></i>근무일 합계</div>
      <div class="sum-value" id="workDaysDisplay">0일</div>
      <div class="sum-sub" id="workDaysSub">휴일 7일 중 0일 근무</div>
    </div>
  </div>

  <div class="reset-row">
    <button class="reset-btn" id="resetBtn"><i class="ti ti-refresh" style="font-size:12px;vertical-align:-1px;margin-right:4px;"></i>초기화</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'weekly_work_hours_v1';
const DAYS = ['일','월','화','수','목','금','토'];
const DEFAULT_HOLIDAY = [0, 6];
const DEFAULT_TARGET = 40;

function defaultState() {
  return {
    target: DEFAULT_TARGET,
    days: DAYS.map((d, i) => ({ day: d, holiday: DEFAULT_HOLIDAY.includes(i), time: '' }))
  };
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      target: parseFloat(document.getElementById('targetHours').value) || DEFAULT_TARGET,
      days: state
    }));
  } catch(e) {}
}

const loaded = loadState();
let state = loaded.days;
document.getElementById('targetHours').value = loaded.target;

function parseTime(val) {
  if (!val) return 0;
  const clean = val.replace(/[^0-9:]/g,'');
  if (clean.includes(':')) {
    const [h, m] = clean.split(':');
    return (parseInt(h)||0) * 60 + Math.min(parseInt(m)||0, 59);
  }
  return (parseInt(clean)||0) * 60;
}

function formatMins(mins) {
  const h = Math.floor(Math.abs(mins)/60);
  const m = Math.abs(mins) % 60;
  return (mins < 0 ? '-' : '') + h + ':' + String(m).padStart(2,'0');
}

function render() {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  state.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'day-card' + (s.holiday ? ' holiday' : '');

    card.title = s.holiday ? '클릭하여 근무일로 전환' : '클릭하여 휴일로 전환';
    card.addEventListener('click', () => {
      state[i].holiday = !state[i].holiday;
      if (state[i].holiday) state[i].time = '';
      render(); updateSummary(); saveState();
    });

    const label = document.createElement('div');
    label.className = 'day-label';
    label.textContent = s.day;

    const inputWrap = document.createElement('div');
    inputWrap.className = 'time-input-wrap';

    if (!s.holiday) {
      const inp = document.createElement('input');
      inp.className = 'time-input';
      inp.type = 'text';
      inp.placeholder = '0:00';
      inp.value = s.time;
      inp.maxLength = 5;
      inp.addEventListener('click', (e) => e.stopPropagation());
      inp.addEventListener('input', (e) => {
        let v = e.target.value.replace(/[^0-9:]/g,'');
        if (v.length === 2 && !v.includes(':') && e.inputType !== 'deleteContentBackward') v = v + ':';
        e.target.value = v;
        state[i].time = v;
        updateSummary(); saveState();
      });
      inp.addEventListener('blur', (e) => {
        const mins = parseTime(e.target.value);
        if (mins > 0) {
          const h = Math.floor(mins/60), m = mins % 60;
          e.target.value = h + ':' + String(m).padStart(2,'0');
          state[i].time = e.target.value;
        }
        updateSummary(); saveState();
      });
      inputWrap.appendChild(inp);
    } else {
      const msg = document.createElement('div');
      msg.className = 'holiday-msg';
      msg.textContent = '휴일';
      inputWrap.style.display = 'flex';
      inputWrap.style.alignItems = 'center';
      inputWrap.style.justifyContent = 'center';
      inputWrap.appendChild(msg);
    }

    card.appendChild(label);
    card.appendChild(inputWrap);
    grid.appendChild(card);
  });
}

function updateSummary() {
  const totalMins = state.reduce((sum, s) => sum + (s.holiday ? 0 : parseTime(s.time)), 0);
  const workDays = state.filter(s => !s.holiday).length;
  const target = parseFloat(document.getElementById('targetHours').value) || 0;
  const targetMins = target * 60;
  const diff = totalMins - targetMins;
  const pct = targetMins > 0 ? Math.min(100, (totalMins / targetMins) * 100) : 0;

  document.getElementById('totalDisplay').textContent = formatMins(totalMins);

  const subEl = document.getElementById('totalSub');
  if (diff >= 0) {
    subEl.textContent = '목표 달성 +' + formatMins(diff) + '시간';
    subEl.style.color = '#3B6D11';
  } else {
    subEl.textContent = '목표 대비 ' + formatMins(Math.abs(diff)) + ' 부족';
    subEl.style.color = '#999994';
  }

  const bar = document.getElementById('progressBar');
  bar.style.width = pct + '%';
  bar.className = 'progress-bar' + (diff > 0 ? ' over' : '');

  document.getElementById('workDaysDisplay').textContent = workDays + '일';
  const holidayCount = state.filter(s => s.holiday).length;
  document.getElementById('workDaysSub').textContent = '7일 중 ' + workDays + '일 근무, ' + holidayCount + '일 휴일';

  const remainingTargetMins = targetMins - totalMins;
  const emptyWorkDays = state.filter(s => !s.holiday && !parseTime(s.time)).length;
  const avgEl = document.getElementById('avgBox');

  if (emptyWorkDays > 0 && remainingTargetMins > 0) {
    const avgMins = Math.ceil(remainingTargetMins / emptyWorkDays);
    avgEl.innerHTML = '남은 <strong>' + emptyWorkDays + '일</strong>에 평균 <strong>' + formatMins(avgMins) + '</strong> 필요';
  } else if (remainingTargetMins <= 0) {
    avgEl.innerHTML = '<strong style="color:#3B6D11">목표 달성 완료!</strong>';
  } else {
    avgEl.innerHTML = '<span style="color:#999994">근무시간을 입력하세요</span>';
  }
}

document.getElementById('targetHours').addEventListener('input', () => { updateSummary(); saveState(); });

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('초기 상태로 리셋할까요?')) return;
  const fresh = defaultState();
  state = fresh.days;
  document.getElementById('targetHours').value = fresh.target;
  localStorage.removeItem(STORAGE_KEY);
  render(); updateSummary();
});

render();
updateSummary();
</script>
</body>
</html>
